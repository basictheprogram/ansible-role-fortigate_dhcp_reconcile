---
# roles/fortigate_dhcp_reconcile/tasks/main.yml
# Orchestrator — runs each step in sequence

- name: "Reconcile | Step 0 - Pre-flight checks"
  ansible.builtin.include_tasks: preflight.yml

- name: "Reconcile | Get current timestamp"
  ansible.builtin.set_fact:
    reconcile_timestamp: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}"

- name: "Reconcile | Step 1 - Pull Fortigate DHCP leases"
  ansible.builtin.include_tasks: fetch_fortigate_leases.yml

- name: "Reconcile | Step 2 - Pull Netbox printer devices"
  ansible.builtin.include_tasks: fetch_netbox_devices.yml

- name: "Reconcile | Step 3 - Compare and classify"
  ansible.builtin.include_tasks: compare.yml

- name: "Reconcile | Step 4 - Generate HTML report"
  ansible.builtin.include_tasks: report.yml

- name: "Reconcile | Step 5 - Optionally patch Netbox IPs (if --tags fix_netbox)"
  ansible.builtin.include_tasks: fix_netbox.yml
  tags:
    - never
    - fix_netbox
